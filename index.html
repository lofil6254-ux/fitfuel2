<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#0a0a14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitFuel">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.jpg">
<title>FitFuel 🏋️</title>
<style>
:root{
  --bg:#0d0d18;--s1:#13131f;--s2:#1a1a2e;--s3:#22223a;--s4:#2a2a46;
  --ac:#c8f53a;--acd:rgba(200,245,58,.13);--acg:linear-gradient(135deg,#c8f53a,#8ed010);
  --bl:#4db8ff;--bld:rgba(77,184,255,.13);
  --pk:#ff4d8f;--pkd:rgba(255,77,143,.13);
  --or:#ff9444;--ord:rgba(255,148,68,.13);
  --gd:#ffd700;--gdd:rgba(255,215,0,.13);
  --tx:#f0f0fa;--tx2:#a0a0c0;--mt:#525270;--br:#252540;--br2:#1c1c34;
  --r:16px;--r2:12px;
  --sh:0 4px 24px rgba(0,0,0,.45);--sh2:0 2px 12px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
input,select,button{font-family:inherit;font-size:inherit}
.page{position:fixed;inset:0;overflow-y:auto;display:none;flex-direction:column;padding-bottom:96px;scroll-behavior:smooth}
.page.on{display:flex}
.wrap{width:100%;max-width:480px;margin:0 auto;padding:0 18px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:16px 28px;border-radius:50px;border:none;cursor:pointer;font-size:17px;font-weight:700;letter-spacing:.2px;transition:transform .15s,box-shadow .15s;box-shadow:var(--sh2)}
.btn:active{transform:scale(.95)}
.bp{background:var(--acg);color:#0a0a10;box-shadow:0 4px 20px rgba(200,245,58,.28)}
.bo{background:var(--s3);border:1.5px solid var(--br);color:var(--tx2)}
.bo:hover,.bo:focus{border-color:var(--ac);color:var(--ac)}
.bw{width:100%}
.bdg{display:inline-flex;align-items:center;padding:5px 13px;border-radius:50px;font-size:13px;font-weight:700;letter-spacing:.2px}
.bg{background:var(--acd);color:var(--ac)}.bb{background:var(--bld);color:var(--bl)}
.bpk{background:var(--pkd);color:var(--pk)}.bor{background:var(--ord);color:var(--or)}.bgd{background:var(--gdd);color:var(--gd)}
.card{background:var(--s2);border:1px solid var(--br2);border-radius:var(--r);padding:20px;margin-bottom:14px;box-shadow:var(--sh2)}
.tag{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--mt)}
.mt{color:var(--mt)}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--s3);border:1.5px solid var(--ac);color:var(--ac);padding:12px 22px;border-radius:50px;font-size:15px;font-weight:700;z-index:9999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none;max-width:92vw;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.toast.on{transform:translateX(-50%) translateY(0)}
.rtbar{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--s2);border:2px solid var(--bl);border-radius:50px;padding:12px 28px;font-size:15px;font-weight:800;color:var(--bl);z-index:400;display:none;align-items:center;gap:12px;cursor:pointer;box-shadow:0 4px 20px rgba(77,184,255,.25)}
.rtbar.on{display:flex}
.rtn{font-size:32px;font-weight:900;min-width:44px;text-align:center;font-variant-numeric:tabular-nums}
#pg-splash{align-items:center;justify-content:center;text-align:center;padding:48px 24px;background:radial-gradient(ellipse at 50% 30%,rgba(200,245,58,.06) 0%,transparent 70%)}
.logo{font-size:72px;font-weight:900;letter-spacing:5px;background:linear-gradient(135deg,var(--ac),var(--bl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.lrow{display:flex;gap:10px;justify-content:center;margin-bottom:28px}
.lbtn{padding:13px 28px;border-radius:50px;border:2px solid var(--br);background:var(--s2);color:var(--tx2);font-size:16px;font-weight:700;cursor:pointer;transition:all .2s}
.lbtn.on{border-color:var(--ac);color:var(--ac);background:var(--acd);box-shadow:0 0 20px rgba(200,245,58,.15)}
#pg-setup{padding:28px 0 100px}
.prog{display:flex;gap:6px;justify-content:center;margin-bottom:28px}
.prg{height:5px;width:48px;border-radius:3px;background:var(--br);transition:all .3s}
.prg.d{background:var(--ac)}.prg.c{background:var(--ac);box-shadow:0 0 10px var(--ac)}
.step{display:none}.step.on{display:block}
.fl{margin-bottom:14px}
.lb{font-size:14px;color:var(--tx2);font-weight:600;margin-bottom:7px;display:block}
.fi{width:100%;background:var(--s3);border:2px solid var(--br);color:var(--tx);border-radius:var(--r2);padding:16px;font-size:17px;outline:none;transition:border-color .2s,box-shadow .2s}
.fi:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(200,245,58,.1)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g1{display:flex;flex-direction:column;gap:9px}
.oc{padding:14px 12px;border-radius:var(--r2);border:2px solid var(--br);background:var(--s2);cursor:pointer;text-align:center;transition:all .18s}
.oc:active{transform:scale(.97)}
.oc.on{border-color:var(--ac);background:var(--acd);box-shadow:0 0 16px rgba(200,245,58,.1)}
.oc-h{display:flex;align-items:center;gap:12px;text-align:start}
.oi{font-size:26px;flex-shrink:0}
.ol{font-size:16px;font-weight:700;color:var(--tx)}.os{font-size:13px;color:var(--mt);margin-top:2px}
.nb{display:flex;gap:10px;margin-top:22px}
.ig2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--s1);border-top:1px solid var(--br2);display:flex;z-index:300;padding:10px 0 14px;box-shadow:0 -4px 24px rgba(0,0,0,.45)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px 4px;border:none;background:transparent;color:var(--mt);transition:color .18s}
.ni.on{color:var(--ac)}
.ni-ic{font-size:26px}
.ni-lb{font-size:12px;font-weight:700;letter-spacing:.3px}
.hero{background:linear-gradient(145deg,var(--s3),var(--s2));border:1px solid var(--br);border-radius:var(--r);padding:20px;margin-bottom:14px;box-shadow:var(--sh)}
.ringwrap{display:flex;align-items:center;gap:18px;margin-top:10px}
.rsvg{width:90px;height:90px;flex-shrink:0}
.rbg2{fill:none;stroke:var(--br);stroke-width:7}
.rfl{fill:none;stroke:var(--ac);stroke-width:7;stroke-linecap:round;stroke-dasharray:220;stroke-dashoffset:220;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset 1.2s ease;filter:drop-shadow(0 0 6px rgba(200,245,58,.4))}
.mbars{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.mb{background:var(--s1);border-radius:10px;padding:10px 8px;text-align:center;border:1px solid var(--br2)}
.mb-l{font-size:11px;color:var(--mt);font-weight:700;margin-bottom:3px;letter-spacing:.3px;text-transform:uppercase}
.mb-v{font-size:17px;font-weight:900}
.mbar{height:4px;background:var(--br);border-radius:2px;margin-top:5px;overflow:hidden}
.mbf{height:100%;border-radius:2px;transition:width 1s}
.logrow{display:flex;gap:8px}
.litems{display:flex;flex-direction:column;gap:7px;margin-top:10px;max-height:170px;overflow-y:auto}
.li{display:flex;justify-content:space-between;align-items:center;background:var(--s3);border-radius:10px;padding:10px 14px;border:1px solid var(--br2)}
.li-del{background:none;border:none;color:var(--mt);cursor:pointer;font-size:18px;padding:0 4px}
.rbanner{background:linear-gradient(145deg,var(--s3),var(--s2));border:1px solid rgba(255,215,0,.18);border-radius:var(--r);padding:16px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:var(--sh2)}
.rtoggle{border:2px solid var(--gd);color:var(--gd);background:var(--gdd);border-radius:50px;padding:8px 18px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.rtoggle.off{border-color:var(--br);color:var(--mt);background:transparent}
.twc{background:var(--s2);border:1px solid var(--br2);border-radius:var(--r);padding:16px;cursor:pointer;transition:border-color .2s,box-shadow .2s;box-shadow:var(--sh2)}
.twc:active{border-color:var(--ac)}
.dayplan{display:flex;overflow-x:auto;gap:8px;padding:4px 0 10px;scrollbar-width:none}
.dayplan::-webkit-scrollbar{display:none}
.dpc{padding:10px 12px;border-radius:var(--r2);border:2px solid var(--br);background:var(--s2);color:var(--mt);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .18s;text-align:center;min-width:68px}
.dpc.on{border-color:var(--ac);color:var(--ac);background:var(--acd);box-shadow:0 0 12px rgba(200,245,58,.15)}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:10px}
.pgst{text-align:center;background:var(--s3);border-radius:var(--r2);padding:14px 8px;border:1px solid var(--br2)}
.pgst-v{font-size:24px;font-weight:900;color:var(--ac)}
.pgst-l{font-size:12px;color:var(--mt);font-weight:700;margin-top:3px}
.wsec-t{display:flex;align-items:center;gap:10px;margin:18px 0 10px}
.wsec-l{flex:1;height:1px;background:var(--br)}
.excard{background:var(--s2);border:1px solid var(--br2);border-radius:var(--r);overflow:hidden;margin-bottom:10px;box-shadow:var(--sh2);transition:border-color .2s}
.excard.exp{border-color:var(--bl);box-shadow:0 4px 20px rgba(77,184,255,.12)}
.exhdr{display:flex;gap:14px;align-items:center;padding:16px;cursor:pointer}
.eximg{width:70px;height:70px;border-radius:12px;overflow:hidden;flex-shrink:0;background:var(--s3);background-size:cover;background-position:center;border:2px solid var(--ac);box-shadow:0 4px 10px rgba(0,0,0,0.3)}
.exnm{font-size:17px;font-weight:800;margin-bottom:5px;color:var(--tx)}
.mtag{padding:4px 10px;border-radius:50px;font-size:12px;font-weight:700;background:var(--pkd);color:var(--pk)}
.exchv{font-size:14px;color:var(--mt);margin-inline-start:auto;transition:transform .25s;flex-shrink:0}
.excard.exp .exchv{transform:rotate(180deg)}
.exbody{display:none;padding:16px;border-top:1px solid var(--br2)}
.excard.exp .exbody{display:block}
.exdg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.exd{background:var(--s3);border-radius:var(--r2);padding:12px;text-align:center;border:1px solid var(--br2)}
.exd-v{font-size:20px;font-weight:900;color:var(--bl)}
.exd-l{font-size:12px;color:var(--mt);font-weight:700;margin-top:3px}
.tips{background:var(--s3);border-radius:var(--r2);padding:14px;margin-top:10px;border:1px solid var(--br2)}
.tips-t{font-size:13px;color:var(--ac);font-weight:800;margin-bottom:8px;letter-spacing:.3px}
.tips ul{padding-inline-start:16px}
.tips li{font-size:14px;color:var(--tx2);margin-bottom:5px;line-height:1.6}
.done-btn{width:100%;margin-top:16px;padding:19px;font-size:18px;letter-spacing:.3px}
.done-btn.cmp{background:var(--acd)!important;color:var(--ac)!important;border:2px solid var(--ac)!important;cursor:default!important;box-shadow:none!important}
.lvlrow{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.daysel{display:flex;overflow-x:auto;gap:8px;padding:4px 0 10px;scrollbar-width:none}
.daysel::-webkit-scrollbar{display:none}
.dpill{padding:10px 18px;border-radius:50px;border:2px solid var(--br);background:var(--s2);color:var(--mt);font-size:14px;font-weight:700;white-space:nowrap;flex-shrink:0;transition:all .18s;opacity:.35;cursor:not-allowed;pointer-events:none}
.dpill.today{border-color:var(--ac);color:var(--ac);background:var(--acd);opacity:1;box-shadow:0 0 0 3px rgba(200,245,58,.2);cursor:default;pointer-events:none}
.mcard.locked{border-color:rgba(200,245,58,.4)!important;background:linear-gradient(145deg,rgba(200,245,58,.05),var(--s2))!important}
.mcard.locked .mc-hdr{opacity:.8}
.meal-done-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 11px;border-radius:50px;background:var(--acd);color:var(--ac);font-size:12px;font-weight:800;border:1px solid rgba(200,245,58,.3);margin-top:5px}
.mode-sw{display:flex;gap:8px;margin-bottom:12px}
.msw{flex:1;padding:13px;border-radius:50px;border:2px solid var(--br);background:transparent;color:var(--tx2);font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.msw.rm{border-color:var(--gd);color:var(--gd);background:var(--gdd)}
.msw.nm{border-color:var(--ac);color:var(--ac);background:var(--acd)}
.dtbar{background:var(--s2);border:1px solid var(--br2);border-radius:var(--r);padding:16px 18px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--sh2)}
.mcard{background:var(--s2);border:1px solid var(--br2);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:var(--sh2)}
.mc-hdr{padding:16px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;gap:10px}
.mc-nm{font-size:18px;font-weight:800;margin-top:4px;line-height:1.3;color:var(--tx)}
.mc-body{display:none;padding:16px 18px;border-top:1px solid var(--br2)}
.mcard.exp .mc-body{display:block}
.mmac{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.mpill{padding:5px 12px;border-radius:50px;font-size:14px;font-weight:700}
.ing-i{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--br2);font-size:15px;line-height:1.6;color:var(--tx2)}
.ing-i:last-child{border:none}
.ing-i::before{content:"•";color:var(--ac);font-size:18px;flex-shrink:0;line-height:1.4}
.minstr{background:var(--s3);border-radius:var(--r2);padding:14px;margin-top:10px;font-size:14px;color:var(--tx2);line-height:1.7;border:1px solid var(--br2)}
.mactions{display:flex;gap:8px;margin-top:12px}
.mactions .btn{flex:1;padding:14px;font-size:15px}
.profav{width:80px;height:80px;border-radius:50%;background:var(--acg);display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:900;color:#0a0a10;margin:0 auto 12px;box-shadow:0 4px 24px rgba(200,245,58,.3)}
.pstats{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.pst{background:var(--s2);border:1px solid var(--br2);border-radius:var(--r);padding:16px;text-align:center;box-shadow:var(--sh2)}
.pst-v{font-size:22px;font-weight:900;color:var(--ac)}
.pst-l{font-size:12px;color:var(--mt);font-weight:700;margin-top:3px;text-transform:uppercase;letter-spacing:.4px}
.tsw{position:relative;width:46px;height:26px;cursor:pointer;flex-shrink:0}
.tsw input{opacity:0;width:0;height:0}
.tsl{position:absolute;inset:0;background:var(--br);border-radius:34px;transition:.3s;cursor:pointer}
.tsl:before{content:"";position:absolute;height:18px;width:18px;left:4px;bottom:4px;background:var(--mt);border-radius:50%;transition:.3s}
input:checked+.tsl{background:var(--ac)}
input:checked+.tsl:before{transform:translateX(20px);background:#0a0a10}
.lang-sw{display:flex;gap:8px}
.lsw{flex:1;padding:13px;border-radius:50px;border:2px solid var(--br);background:transparent;color:var(--tx2);font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.lsw.on{border-color:var(--ac);color:var(--ac);background:var(--acd)}
.mov{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px)}
.mov.on{display:flex}
.modal{background:var(--s1);border:1px solid var(--br);border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:24px 20px;max-height:88vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.6)}
.mcls{float:inline-end;background:var(--s3);border:none;color:var(--tx2);font-size:18px;cursor:pointer;width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center}
.rstbtn{width:100%;padding:15px;border-radius:var(--r2);border:2px solid var(--br);background:transparent;color:var(--mt);font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s}
.rstbtn:hover{border-color:var(--pk);color:var(--pk);background:var(--pkd)}
.wibanner{background:linear-gradient(145deg,rgba(77,184,255,.12),rgba(77,184,255,.06));border:1.5px solid rgba(77,184,255,.4);border-radius:var(--r);padding:14px 16px;margin-bottom:14px;display:none;align-items:center;justify-content:space-between;gap:10px;box-shadow:var(--sh2);cursor:pointer}
.wibanner.on{display:flex}
.wi-btn{border:2px solid var(--bl);color:var(--bl);background:var(--bld);border-radius:50px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:16px}
.wday{display:flex;flex-direction:column;align-items:center;gap:4px}
.wday-nm{font-size:10px;font-weight:800;color:var(--mt);text-transform:uppercase;letter-spacing:.3px}
.wday-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid var(--br);background:var(--s3);position:relative;flex-shrink:0}
.wday-circle.trained{border-color:var(--ac);background:rgba(200,245,58,.15)}
.wday-circle.today{box-shadow:0 0 0 2px var(--bl)}
.wday-dots{display:flex;gap:3px;margin-top:1px}
.wdot{width:6px;height:6px;border-radius:50%;background:var(--br)}
.wdot.cal{background:var(--or)}
.wdot.pro{background:var(--bl)}
.dash-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.dstat{background:var(--s3);border-radius:var(--r2);padding:12px;border:1px solid var(--br2);text-align:center}
.dstat-ic{font-size:20px;margin-bottom:4px}
.dstat-v{font-size:18px;font-weight:900;color:var(--ac)}
.dstat-l{font-size:11px;color:var(--mt);font-weight:700;margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
.legend-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--mt)}
.shoplist{background:var(--s2);border:1px solid var(--br2);border-radius:var(--r);padding:18px;margin-top:14px;box-shadow:var(--sh2)}
.shoplist-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.shoplist-ic{font-size:24px}
.shoplist-ttl{font-size:17px;font-weight:900;color:var(--tx)}
.shoplist-sub{font-size:13px;color:var(--mt);margin-top:2px}
.shop-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--br2)}
.shop-item:last-child{border:none}
.shop-nm{font-size:15px;color:var(--tx);font-weight:600}
.shop-amt{font-size:15px;font-weight:900;color:var(--ac)}
.shop-cat{font-size:11px;color:var(--mt);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="rtbar" id="rtbar" onclick="stopRT()">⏱ <span class="rtn" id="rtn">60</span>s</div>

<!-- SPLASH -->
<div class="page" id="pg-splash">
  <div style="font-size:56px;margin-bottom:12px">🏋️</div>
  <div class="logo">FITFUEL</div>
  <div style="font-size:14px;color:var(--mt);letter-spacing:2px;margin:6px 0 24px">KETTLEBELL · NUTRITION · RAMADAN</div>
  <div class="lrow">
    <button class="lbtn on" onclick="setL('ar',this)">العربية</button>
    <button class="lbtn" onclick="setL('en',this)">English</button>
  </div>
  <button class="btn bp" style="padding:15px 52px;font-size:17px" onclick="startApp()" id="sp-btn">ابدأ 🚀</button>

    b.classList.toggle('on',(ar&&b.textContent.includes('العربية'))||(!ar&&b.textContent.includes('English')));
  });
}
function setL(l,btn){
  L=l;
  document.querySelectorAll('.lbtn').forEach(b=>b.classList.remove('on'));

function save(){
  try{
    localStorage.setItem('ff9',JSON.stringify({L,P,SEL,DLOG,WH,MP,MP_RAM,MP_NRM,MEAL_EATEN,CD,isRamadan,mealMode,WP:_WP}));
  }catch(e){}
}
function load(){
  try{
    // Try ff9 first, fall back to ff8 (old key) to preserve profile — but reset meals to force fresh generation
    const raw=localStorage.getItem('ff9');
    const old=localStorage.getItem('ff8');
    const d=JSON.parse(raw||old||'null');
    if(!d||!d.P||!d.P.name) return false;
    L=d.L||'ar'; P=d.P||{}; SEL=d.SEL||{}; DLOG=d.DLOG||{};
    WH=d.WH||[]; CD=d.CD||0;
    MEAL_EATEN=d.MEAL_EATEN||{};
    isRamadan=d.isRamadan!==undefined?d.isRamadan:true;
    mealMode=d.mealMode||'ramadan';
    _WP=d.WP||null;
    // If loaded from old key (ff8), reset meals so new WEEK_PLAN is used
    if(!raw&&old){MP={}; MP_RAM={}; MP_NRM={}; localStorage.removeItem('ff9_meal_date');}
    else{MP=d.MP||{}; MP_RAM=d.MP_RAM||{}; MP_NRM=d.MP_NRM||{};}
    // Sync MP to current mode
    if(mealMode==='ramadan'&&Object.keys(MP_RAM).length) MP=MP_RAM;
    else if(mealMode==='normal'&&Object.keys(MP_NRM).length) MP=MP_NRM;
    return true;
  }catch(e){return false;}
}
function toast(msg,ms=3000){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('on');
  setTimeout(()=>el.classList.remove('on'),ms);
}

// ============================================================
// CALORIE CALC
// ============================================================
function calcCal(){
  const w=Number(P.weight)||70, h=Number(P.height)||170,
        a=Number(P.age)||25, male=P.gender!=='female';
  const bmr=male?(10*w+6.25*h-5*a+5):(10*w+6.25*h-5*a-161);
  const tdee=Math.round(bmr*(Number(P.activity)||1.55));
  const g=P.goal||'maintain';
  P.targetCal=g==='lose'?tdee-400:g==='gain'?tdee+300:g==='recomp'?tdee-200:tdee;
  P.protG=Math.round(w*(g==='recomp'||g==='gain'?2.2:2.0));
  P.carbG=Math.round((P.targetCal*(g==='recomp'?0.35:0.45))/4);
  P.fatG=Math.round((P.targetCal*0.25)/9);
}

function showMain(){
  document.getElementById('pg-splash').classList.remove('on');
  document.getElementById('pg-setup').classList.remove('on');
  document.getElementById('pg-main').classList.add('on');
  applyLang();
  const today=new Date().toDateString();
  if(P.lastWD!==today){ P.doneToday=false; }
  if(P.lastRunDate!==today){ P.runDoneToday=false; }
  checkDailyMealRefresh();
  if(!_WP||_WP._date!==today) genWK(false);
  rRamadanUI(); rHome(); rWorkout(); rMeals(); rProfile();
}
function showTab(tab){
  ['home','workout','meals','profile'].forEach(tb=>{
    document.getElementById('t-'+tb).style.display='none';
    document.getElementById('nav-'+tb).classList.remove('on');
  });
  document.getElementById('t-'+tab).style.display='block';
  document.getElementById('nav-'+tab).classList.add('on');
  if(tab==='home'){ rRamadanUI(); rHome(); }
  if(tab==='workout') rWorkout();
  if(tab==='meals') rMeals();
  if(tab==='profile'){ rProfile(); setTimeout(renderDailyChart,100); }
}
function checkDailyMealRefresh(){
  const today=new Date().toDateString();
  const lastMealDate=localStorage.getItem('ff9_meal_date');
  if(lastMealDate!==today){
    const tc=Math.round(P.targetCal)||2000;
    for(let d=0;d<7;d++){
      MP_RAM[d]=buildDay('ramadan',tc,d);
      MP_NRM[d]=buildDay('normal',tc,d);
    }
    MP=mealMode==='ramadan'?MP_RAM:MP_NRM;
    MEAL_EATEN={};
    localStorage.setItem('ff9_meal_date',today);
    save();
  }
}

  el.classList.add('on'); SEL[k]=v;

function nx(n){
  if(n===1){
    P.name=document.getElementById('i-nm').value.trim();
    P.age=+document.getElementById('i-ag').value;
    P.gender=document.getElementById('i-gn').value;
    P.weight=+document.getElementById('i-wt').value;
    P.height=+document.getElementById('i-ht').value;
    const ar2=L==='ar';
    if(!P.name||!P.age||!P.weight||!P.height){toast(ar2?'أكمل بياناتك':'Fill all fields');return;}
    if(P.weight<30||P.weight>300){toast(ar2?'الوزن يجب أن يكون بين 30 و 300 كغ':'Weight must be 30–300 kg');return;}
    if(P.height<100||P.height>250){toast(ar2?'الطول يجب أن يكون بين 100 و 250 سم':'Height must be 100–250 cm');return;}
    if(P.age<10||P.age>100){toast(ar2?'العمر يجب أن يكون بين 10 و 100':'Age must be 10–100');return;}
  }
  if(n===2&&!SEL.goal){toast(L==='ar'?'اختر هدفك':'Choose goal');return;}
  if(n===3&&!SEL.level){toast(L==='ar'?'اختر مستواك':'Choose level');return;}
  if(n===4&&!SEL.act){toast(t('toast-act'));return;}
  CS=n+1; showStep(CS);
}
function pv(){ CS--; showStep(CS); }
function finSetup(){
  P.goal=SEL.goal; P.level=SEL.level; P.activity=parseFloat(SEL.act);
  P.sessions=0; P.streak=0; P.intensity=1; P.lastWD=null; P.doneToday=false;
  P.lastWeighIn=Date.now();
  P.runSchedule=[..._tmpRunSchedule];
  P.runDays=_tmpRunSchedule.filter(Boolean).length;
  P.runKm=P.runDays>0?Math.max(1,+document.getElementById('i-rkm').value||5):0;
  P.runDoneToday=false; P.lastRunDate=null;
  calcCal();
  const tc=Math.round(P.targetCal)||2000;
  for(let d=0;d<7;d++){
    MP_RAM[d]=buildDay('ramadan',tc,d);
    MP_NRM[d]=buildDay('normal',tc,d);
  }
  MP=mealMode==='ramadan'?MP_RAM:MP_NRM;
  MEAL_EATEN={};
  localStorage.setItem('ff9_meal_date',new Date().toDateString());
  genWK(false); save(); showMain();
}

let _tmpRunSchedule=new Array(7).fill(false);
function renderRunDayPicker(containerId){
  const ar=L==='ar';
  const container=document.getElementById(containerId);
  if(!container) return;
  const WEEK_T=['upper','lower','rest','full','cardio','rest','upper'];
  const dayN_ar=['أحد','إثنين','ثلاث','أربع','خميس','جمعة','سبت'];
  const dayN_en=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const ic={upper:'💪',lower:'🦵',rest:'😴',full:'⚡',cardio:'🏃'};
  const lbl_ar={upper:'علوي',lower:'سفلي',rest:'راحة',full:'كامل',cardio:'كارديو'};
  const lbl_en={upper:'Upper',lower:'Lower',rest:'Rest',full:'Full',cardio:'Cardio'};
  container.innerHTML=WEEK_T.map((tp,d)=>{
    const nm=ar?dayN_ar[d]:dayN_en[d];
    const tpLbl=ar?lbl_ar[tp]:lbl_en[tp];
    const sel=_tmpRunSchedule[d];
    const isLower=tp==='lower';
    const warn=sel&&isLower?`<div style="font-size:9px;color:var(--or);line-height:1.2">${ar?'⚠️أرجل':'⚠️Legs'}</div>`:'';
    return`<div onclick="toggleRunDay(${d})" style="flex:1;min-width:0;text-align:center;padding:9px 3px;border-radius:12px;border:2px solid ${sel?'var(--bl)':'var(--br)'};background:${sel?'rgba(77,184,255,.13)':'var(--s2)'};cursor:pointer;transition:all .18s;user-select:none">
      <div style="font-size:17px">${sel?'🏃':ic[tp]}</div>
      <div style="font-size:11px;font-weight:800;color:${sel?'var(--bl)':'var(--tx)'};margin-top:2px">${nm}</div>
      <div style="font-size:9px;color:var(--mt);margin-top:1px">${tpLbl}</div>
      ${warn}
    </div>`;
  }).join('');
}
function toggleRunDay(d){
  _tmpRunSchedule[d]=!_tmpRunSchedule[d];

  banner.classList.toggle('on',due);
  if(!due) return;

    :`Last updated ${daysSince} days ago — your weight may have changed`;

}

  P.bannerDismissed=true;

function rHome(){
  if(!P.name) return;
  rWeighInBanner();
  applyLang();
  document.getElementById('hm-gr').textContent=t('hm-gr');
  document.getElementById('hm-nm').textContent=P.name+' 👋';
  const key=new Date().toDateString();
  if(!DLOG[key]) DLOG[key]={foods:[],tCal:0,tP:0,tC:0,tF:0};
  const log=DLOG[key];
  const target=P.targetCal||2000, consumed=log.tCal||0;
  const pct=Math.min(consumed/target,1);
  document.getElementById('rfl').style.strokeDashoffset=220-(pct*220);
  document.getElementById('r-num').textContent=consumed;
  document.getElementById('r-lbl').textContent='/'+target;
  document.getElementById('cv1').textContent=target+' kcal';
  document.getElementById('cv2').textContent=consumed+' kcal';
  document.getElementById('cv3').textContent=Math.max(0,target-consumed)+' kcal';
  document.getElementById('mb1v').textContent=(log.tP||0)+'g';
  document.getElementById('mb1f').style.width=Math.min((log.tP||0)/(P.protG||1)*100,100)+'%';
  document.getElementById('mb2v').textContent=(log.tC||0)+'g';
  document.getElementById('mb2f').style.width=Math.min((log.tC||0)/(P.carbG||1)*100,100)+'%';
  document.getElementById('mb3v').textContent=(log.tF||0)+'g';
  document.getElementById('mb3f').style.width=Math.min((log.tF||0)/(P.fatG||1)*100,100)+'%';
  rLogItems(); rTWCard();

  const cl=Math.round(+document.getElementById('log-cl').value);
  if(!nm||!cl||cl<=0){toast(t('toast-logfill'));return;}
  const key=new Date().toDateString();
  if(!DLOG[key]) DLOG[key]={foods:[],tCal:0,tP:0,tC:0,tF:0};
  const p=Math.round(cl*0.25/4),c2=Math.round(cl*0.45/4),f=Math.round(cl*0.30/9);
  DLOG[key].foods.push({name:nm,cal:cl,p,c:c2,f});
  DLOG[key].tCal=(DLOG[key].tCal||0)+cl;
  DLOG[key].tP=(DLOG[key].tP||0)+p;
  DLOG[key].tC=(DLOG[key].tC||0)+c2;
  DLOG[key].tF=(DLOG[key].tF||0)+f;
  document.getElementById('log-nm').value='';
  document.getElementById('log-cl').value='';
  save(); rHome();
}
function delLog(i){
  const key=new Date().toDateString(), log=DLOG[key]; if(!log) return;
  const f=log.foods.splice(i,1)[0];
  if(f){ log.tCal-=f.cal||0; log.tP-=f.p||0; log.tC-=f.c||0; log.tF-=f.f||0; }
  save(); rHome();
}
function logMeal(cal,nm){
  const key=new Date().toDateString();
  if(!DLOG[key]) DLOG[key]={foods:[],tCal:0,tP:0,tC:0,tF:0};
  cal=Math.round(+cal);
  const p=Math.round(cal*0.28/4),c2=Math.round(cal*0.42/4),f=Math.round(cal*0.30/9);
  DLOG[key].foods.push({name:nm,cal,p,c:c2,f});
  DLOG[key].tCal=(DLOG[key].tCal||0)+cal;
  DLOG[key].tP=(DLOG[key].tP||0)+p;
  DLOG[key].tC=(DLOG[key].tC||0)+c2;
  DLOG[key].tF=(DLOG[key].tF||0)+f;
  save(); rHome(); toast('✅ '+nm+' — '+cal+' kcal');
}
function eatMeal(mealKey,cal,nm){
  // Lock the meal type for today
  const todayKey=new Date().toDateString();
  const lockKey=todayKey+'_'+mealKey;
  if(MEAL_EATEN[lockKey]) return; // already eaten
  MEAL_EATEN[lockKey]=true;
  // Log to calorie tracker
  logMeal(cal,nm);
  // Re-render meals to show locked state
  rDayMeals();
  toast((L==='ar'?'🔒 تم تسجيل ':'🔒 Logged & locked: ')+nm);
}

function scaleMealToTarget(meal, targetCal){
  if(!meal.ings || !meal.ings.length){
    // Legacy fallback
    const ratio = targetCal / meal.cal;
    return{...meal, cal:targetCal,
      p:Math.round(meal.p*ratio), c:Math.round(meal.c*ratio), f:Math.round(meal.f*ratio)};
  }
  const baseCal = meal.ings.reduce((s,ing)=> s + (ing.amt * getKcal(ing.key) / 100), 0);
  const ratio = targetCal / baseCal;
  const scaledIngs = meal.ings.map(ing =>({
    ...ing,
    amt: Math.round(ing.amt * ratio)
  }));
  const scaledCal = Math.round(scaledIngs.reduce((s,ing)=> s + (ing.amt * getKcal(ing.key)/100), 0));
  const scaledP = Math.round(meal.p * ratio);
  const scaledC = Math.round(meal.c * ratio);
  const scaledF = Math.round(meal.f * ratio);
  return{...meal, ings:scaledIngs, cal:scaledCal, p:scaledP, c:scaledC, f:scaledF};
}

function fmtIng(ing, lang){
  const lbl = lang==='ar' ? ing.ar : ing.en;
  const amt = ing.amt;
  // Format amount nicely
  let amtStr;
  if(ing.unit==='ml'){
    amtStr = amt+'ml';
  } else if(ing.unit==='pcs'){
    // Convert grams back to pieces
    const pcs = Math.max(1, Math.round(amt / ing.gPerPc));
    const grams = Math.round(pcs * ing.gPerPc);
    amtStr = grams+'g ('+pcs+' '+(lang==='ar'?ing.pcs_ar:ing.pcs_en)+')';
  } else {
    amtStr = amt+'g';
  }
  return amtStr+' '+lbl;
}

function buildDay(mode, targetCal, dayIdx){
  const tc = Math.round(targetCal)||2000;
  const d = (dayIdx !== undefined ? dayIdx : new Date().getDay()) % 7;
  if(mode==='ramadan'){
    const plan = WEEK_PLAN_RAM[d];
    const iftarCal  = Math.round(tc*0.25);
    const ishaCal   = Math.round(tc*0.45);
    const suhoorCal = tc - iftarCal - ishaCal;
    return{mode,
      iftar: scaleMealToTarget(plan.iftar, iftarCal),
      isha:  scaleMealToTarget(plan.isha,  ishaCal),
      suhoor:scaleMealToTarget(plan.suhoor,suhoorCal>0?suhoorCal:Math.round(tc*0.30))
    };
  } else {
    const plan = WEEK_PLAN[d];
    const bfCal   = Math.round(tc*0.25);
    const lnCal   = Math.round(tc*0.35);
    const snCal   = Math.round(tc*0.12);
    const dnCal   = tc - bfCal - lnCal - snCal;
    return{mode,
      breakfast:scaleMealToTarget(plan.breakfast, bfCal),
      lunch:    scaleMealToTarget(plan.lunch,     lnCal),
      snack:    scaleMealToTarget(plan.snack,     snCal),
      dinner:   scaleMealToTarget(plan.dinner,    dnCal>0?dnCal:Math.round(tc*0.28))
    };
  }
}

function forceGenAllMeals(){
  const tc=Math.round(P.targetCal)||2000;
  for(let d=0;d<7;d++){
    MP_RAM[d]=buildDay('ramadan',tc,d);
    MP_NRM[d]=buildDay('normal',tc,d);
  }
  MP=mealMode==='ramadan'?MP_RAM:MP_NRM;
  MEAL_EATEN={};
  localStorage.setItem('ff9_meal_date',new Date().toDateString());
  toast(t('toast-meals')); save(); rMeals();
}

function refreshMeal(mKey){
  if(!MP[CD]) return;
  const tc=Math.round(P.targetCal)||2000;
  const isRam=mealMode==='ramadan';
  const keys=isRam?['iftar','isha','suhoor']:['breakfast','lunch','snack','dinner'];
  const fracs=isRam?{iftar:0.25,isha:0.45,suhoor:0.30}:{breakfast:0.25,lunch:0.35,snack:0.12,dinner:0.28};
  const newBase=rand(ML[mealMode==='ramadan'?'ramadan':'normal'][mKey]);
  const targetForMeal=Math.round(tc*fracs[mKey]);
  MP[CD][mKey]=scaleMealToTarget(newBase, targetForMeal);
  save(); rDayMeals(); toast(t('toast-meal1'));
}

function rMeals(){
  if(!P.name) return;
  const ar=L==='ar';
  document.getElementById('ml-ti').textContent=t('ml-ti');
  const msRm=document.getElementById('msw-rm'), msNm=document.getElementById('msw-nm');
  msRm.className='msw'+(mealMode==='ramadan'?' rm':'');
  msNm.className='msw'+(mealMode==='normal'?' nm':'');
  const days_ar=['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  const days_en=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const todayIdx=new Date().getDay();
  CD=todayIdx;
  const daysel=document.getElementById('daysel');
  daysel.innerHTML=[0,1,2,3,4,5,6].map(d=>{
    const nm=ar?days_ar[d]:days_en[d];
    const isToday=d===todayIdx;
    return`<div class="dpill${isToday?' today':''}">${isToday?(ar?'📅 ':' 📅')+nm:nm}</div>`;
  }).join('');
  if(!MP[CD]) MP[CD]=buildDay(mealMode,Math.round(P.targetCal)||2000,CD);
  const day=MP[CD];
  const meals=mealMode==='ramadan'
    ?[{k:'iftar',m:day.iftar},{k:'isha',m:day.isha},{k:'suhoor',m:day.suhoor}]
    :[{k:'breakfast',m:day.breakfast},{k:'lunch',m:day.lunch},{k:'snack',m:day.snack},{k:'dinner',m:day.dinner}];
  const totalCal=meals.reduce((s,{m})=>s+(m&&m.cal||0),0);
  const totalP=meals.reduce((s,{m})=>s+(m&&m.p||0),0);
  const target=P.targetCal||2000;
  const proteinTarget=Math.round((P.weight||80)*2);
  document.getElementById('dt-lb').textContent=t('dt-lb');
  document.getElementById('dt-cl').textContent=totalCal+' kcal';
  document.getElementById('dt-plb').textContent=ar?'بروتين اليوم':'Daily Protein';
  document.getElementById('dt-pv').textContent=totalP+'g / '+proteinTarget+'g';
  document.getElementById('dt-lbt').textContent=t('dt-lbt');
  document.getElementById('dt-tv').textContent=target+' kcal';
  rDayMeals();
}
function rDayMeals(){
  const ar=L==='ar';
  if(!MP[CD]) return;
  const day=MP[CD];
  const meals=mealMode==='ramadan'
    ?[{k:'iftar',m:day.iftar},{k:'isha',m:day.isha},{k:'suhoor',m:day.suhoor}]
    :[{k:'breakfast',m:day.breakfast},{k:'lunch',m:day.lunch},{k:'snack',m:day.snack},{k:'dinner',m:day.dinner}];
  const todayKey=new Date().toDateString();
  let h='';
  meals.forEach(({k,m})=>{
    if(!m) return;
    const nm=ar?m.ar:m.en;
    const time=ar?m.time_ar:m.time_en;
    const instr=ar?m.p_ar:m.p_en;
    const fridgeNote=ar?(m.fridge_ar||''):(m.fridge_en||'');
    // Build ingredient display from scaled ings array
    const ings = (m.ings||[]).map(ing => fmtIng(ing, L));
    const lockKey=todayKey+'_'+k;
    const eaten=!!MEAL_EATEN[lockKey];
    h+=`<div class="mcard${eaten?' locked':''}" id="mc-${k}">
      <div class="mc-hdr" onclick="togMC('${k}')">
        <div style="flex:1">
          <div class="tag">${t('mtype-'+k)}</div>
          <div class="mc-nm">${nm}</div>
          <div style="font-size:13px;color:var(--mt);margin-top:3px">${time} · ${m.cal} kcal · <span style="color:var(--bl)">${m.p}g protein</span></div>
          ${fridgeNote?`<div style="font-size:12px;color:var(--ac);font-weight:700;margin-top:3px">${fridgeNote}</div>`:''}
          ${eaten?`<div class="meal-done-badge">✅ ${ar?'تم تناولها':'Eaten'}</div>`:''}
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="color:var(--mt);font-size:14px">▼</span>
        </div>
      </div>
      <div class="mc-body">
        <div class="mmac">
          <span class="mpill" style="background:var(--bld);color:var(--bl)">${m.p}g P</span>
          <span class="mpill" style="background:var(--ord);color:var(--or)">${m.c}g C</span>
          <span class="mpill" style="background:var(--pkd);color:var(--pk)">${m.f}g F</span>
        </div>
        <div>${ings.map(ig=>`<div class="ing-i">${ig}</div>`).join('')}</div>
        <div class="minstr">${instr}</div>
        <div class="mactions">
          ${eaten
            ? `<button class="btn done-btn cmp" disabled>🔒 ${ar?'تم تناولها — مقفلة حتى الغد':'Eaten — Locked until tomorrow'}</button>`
            : `<button class="btn bp" onclick="eatMeal('${k}',${m.cal},'${nm.replace(/'/g,'')}')">✅ ${ar?'أكلتها':'I ate this'}</button>`
          }
        </div>
      </div>
    </div>`;
  });
  document.getElementById('mlcnt').innerHTML=h;
  rShopList(meals);
}

function rShopList(meals){
  const ar=L==='ar';
  const shopEl=document.getElementById('shoplist');
  const itemsEl=document.getElementById('shopitems');
  if(!meals||!meals.length){shopEl.style.display='none';return;}
  // Aggregate all ingredients across all meals
  const agg={};
  meals.forEach(({m})=>{
    if(!m||!m.ings) return;
    m.ings.forEach(ing=>{
      const key=ing.key;
      const label=ar?ing.ar:ing.en;
      if(!agg[key]) agg[key]={label,amt:0,unit:ing.unit,key,gPerPc:ing.gPerPc||null,pcs_ar:ing.pcs_ar||'pcs',pcs_en:ing.pcs_en||'pcs'};
      agg[key].amt+=ing.amt;
    });
  });
  const items=Object.values(agg).sort((a,b)=>a.label.localeCompare(b.label));
  document.getElementById('shop-ttl').textContent=ar?'قائمة المشتريات اليوم':'Today\'s Shopping List';
  document.getElementById('shop-sub').textContent=ar?`${items.length} مكوّن — كمّيات دقيقة لليوم`:`${items.length} ingredients — exact amounts for today`;
  itemsEl.innerHTML=items.map(it=>{
    const icon=ingCategory(it.key);
    let amtStr;
    if(it.unit==='pcs'&&it.gPerPc){
      const pieces=Math.ceil(it.amt/it.gPerPc);
      const unitLabel=ar?it.pcs_ar:it.pcs_en;
      amtStr=pieces+' '+unitLabel;
    } else if(it.unit==='ml'){
      amtStr=it.amt+'ml';
    } else {
      amtStr=it.amt+'g';
    }
    return`<div class="shop-item">
      <div>
        <div class="shop-nm">${icon} ${it.label}</div>
      </div>
      <div class="shop-amt">${amtStr}</div>
    </div>`;
  }).join('');
  shopEl.style.display='block';
}

const WEEK=['upper','lower','rest','full','cardio','rest','upper'];

function getPool(type){
  if(type==='rest') return [];
  const il=P.intensity||1;
  const maxDiff=il<=2?1:il===3?2:3;
  const pool=(EX[type]||[]).filter(e=>e.diff<=maxDiff);
  return shuf([...pool]).slice(0,4);
}

function genWK(regen){
  const today=new Date().toDateString();
  const type=WEEK[new Date().getDay()], il=Math.min(P.intensity||1,5);
  _WP = type==='rest' ? {type:'rest',_date:today} :
    {type,_date:today,main:getPool(type),warmup:shuf([...EX.warmup]).slice(0,3),cooldown:[...EX.cooldown],intensity:il};
  if(regen){save();toast(t('toast-newses'));}
  rWorkout(); rTWCard();
}

const ETM={};
window.startExTmr = function(ev,id,sec){
  ev.stopPropagation();
  const ar=L==='ar';
  const btn=document.getElementById('tb-'+id);
  const txt=document.getElementById('tx-'+id);
  if(ETM[id]){
    clearInterval(ETM[id].i);
    delete ETM[id];
    btn.innerHTML='▶ '+(ar?'ابدأ':'Start');
    btn.style.borderColor=''; btn.style.color='';
    return;
  }
  btn.innerHTML='⏸ '+(ar?'إيقاف':'Pause');
  btn.style.borderColor='var(--or)'; btn.style.color='var(--or)';
  let s=sec;
  txt.textContent='00:'+(s<10?'0'+s:s);
  const iv=setInterval(()=>{
    s--;
    if(s<0){
      clearInterval(iv);
      delete ETM[id];
      btn.innerHTML='✅ '+(ar?'انتهى':'Done');
      btn.style.borderColor='var(--ac)'; btn.style.color='var(--ac)';
      txt.textContent='00:00';
      new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play().catch(()=>{});
      return;
    }
    txt.textContent='00:'+(s<10?'0'+s:s);
  },1000);
  ETM[id]={i:iv};
};

// DAILY CHART
// ============================================================
function renderDailyChart(){
  const grid=document.getElementById('week-grid');
  const statsBox=document.getElementById('dash-stats');
  const subEl=document.getElementById('dc-sub');
  if(!grid) return;
  const ar=L==='ar';
  const today=new Date(); today.setHours(0,0,0,0);
  const tc=P.targetCal||2000;
  const tp=P.protG||Math.round((P.weight||80)*2);

  // Build current week Mon–Sun (7 days ending on coming Sunday)
  // Find Monday of this week
  const dow=today.getDay(); // 0=Sun
  const mondayOffset=dow===0?-6:1-dow;
  const monday=new Date(today); monday.setDate(today.getDate()+mondayOffset);

  const dayNamesAr=['أحد','إثنين','ثلاث','أربع','خميس','جمعة','سبت'];
  const dayNamesEn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  const weekDays=[];
  for(let i=0;i<7;i++){
    const d=new Date(monday); d.setDate(monday.getDate()+i);
    const key=d.toDateString();
    const trained=WH.some(h=>h.date===key);
    const log=DLOG[key]||{tCal:0,tP:0};
    const calOk=log.tCal>0&&log.tCal>=(tc*0.85);
    const proOk=log.tP>0&&log.tP>=(tp*0.85);
    const isToday=d.getTime()===today.getTime();
    const isFuture=d.getTime()>today.getTime();
    const name=ar?dayNamesAr[d.getDay()]:dayNamesEn[d.getDay()];
    weekDays.push({key,trained,calOk,proOk,isToday,isFuture,name,cal:log.tCal,pro:log.tP});
  }

  grid.innerHTML=weekDays.map(d=>{
    const circleClass='wday-circle'+(d.trained?' trained':'')+(d.isToday?' today':'')+(d.isFuture?' future':'');
    const todayStyle=d.isToday&&!d.trained?'border-color:#4db8ff;':'';
    const futureStyle=d.isFuture?'opacity:0.35;':'';
    const dots=(!d.isFuture)
      ?`<div class="wday-dots">
          <span class="wdot cal" style="${d.calOk?'':'opacity:0.2'}"></span>
          <span class="wdot pro" style="${d.proOk?'':'opacity:0.2'}"></span>
        </div>`
      :'<div class="wday-dots"></div>';
    return `<div class="wday">
      <div class="${circleClass}" style="${todayStyle}${futureStyle}">${d.trained?'✓':d.isToday?'●':'·'}</div>
      <div style="font-size:10px;color:${d.isToday?'#4db8ff':d.isFuture?'#444':'var(--mt)'};font-weight:${d.isToday?'700':'400'}">${d.name}</div>
      ${dots}
    </div>`;
  }).join('');

  // Stats: streak, sessions this month, avg kcal 7d, avg prot 7d
  const streak=P.streak||0;
  const now=new Date();
  const monthStart=new Date(now.getFullYear(),now.getMonth(),1).toDateString();
  const sessionsThisMonth=WH.filter(h=>{
    const hd=new Date(h.date);
    return hd>=new Date(monthStart);
  }).length;

  // 7-day avg kcal and protein
  let sumKcal=0,sumProt=0,loggedDays=0;
  for(let i=6;i>=0;i--){
    const d=new Date(today); d.setDate(today.getDate()-i);
    const log=DLOG[d.toDateString()];
    if(log&&log.tCal>0){sumKcal+=log.tCal;sumProt+=log.tP;loggedDays++;}
  }
  const avgKcal=loggedDays>0?Math.round(sumKcal/loggedDays):0;
  const avgProt=loggedDays>0?Math.round(sumProt/loggedDays):0;

  const trainedThisWeek=weekDays.filter(d=>d.trained&&!d.isFuture).length;
  const totalPastDays=weekDays.filter(d=>!d.isFuture).length;

  if(subEl){
    subEl.textContent=ar
      ?`${trainedThisWeek} تمارين من ${totalPastDays} يوم هذا الأسبوع`
      :`${trainedThisWeek} of ${totalPastDays} days trained this week`;
  }

  const dstats=[
    {icon:'🔥',val:streak+(ar?' يوم':' days'),lbl:ar?'تتالي':'Streak'},
    {icon:'🏋️',val:sessionsThisMonth,lbl:ar?'جلسة هذا الشهر':'Sessions this month'},
    {icon:'🎯',val:avgKcal>0?avgKcal+' kcal':(ar?'—':'—'),lbl:ar?'متوسط 7 أيام':'Avg kcal (7d)'},
    {icon:'💪',val:avgProt>0?avgProt+'g':(ar?'—':'—'),lbl:ar?'متوسط بروتين':'Avg protein (7d)'},
  ];
  statsBox.innerHTML=dstats.map(s=>
    `<div class="dstat"><div style="font-size:18px">${s.icon}</div><div class="dstat-v">${s.val}</div><div class="dstat-l">${s.lbl}</div></div>`
  ).join('');
}

let RTI=null, _AC=null;
function getAC(){
  if(!_AC||_AC.state==='closed') _AC=new(window.AudioContext||window.webkitAudioContext)();
  if(_AC.state==='suspended') _AC.resume();
  return _AC;
}
function beep(freq,dur,vol){
  try{const ctx=getAC(),o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;o.type='sine';g.gain.setValueAtTime(vol||0.4,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);o.start(ctx.currentTime);o.stop(ctx.currentTime+dur);}catch(e){}
}
function finishBeep(){
  try{
    const ctx=getAC(), now=ctx.currentTime;
    function tone(freq,t,dur,vol){const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;o.type='sine';g.gain.setValueAtTime(0.001,now+t);g.gain.linearRampToValueAtTime(vol,now+t+0.02);g.gain.setValueAtTime(vol,now+t+dur-0.05);g.gain.linearRampToValueAtTime(0.001,now+t+dur);o.start(now+t);o.stop(now+t+dur+0.05);}
    tone(660,0.00,0.13,0.5); tone(770,0.22,0.13,0.55); tone(880,0.44,0.13,0.6); tone(990,0.66,0.13,0.65);
    tone(1320,0.95,1.5,0.85);
  }catch(e){}
}
function startRT(evt,rv){
  evt.stopPropagation(); let s=parseInt(rv)||60; clearInterval(RTI);
  const el=document.getElementById('rtbar');
  let rem=s; document.getElementById('rtn').textContent=rem; el.classList.add('on');
  RTI=setInterval(()=>{
    rem--;
    document.getElementById('rtn').textContent=rem;
    if(rem>0&&rem<=10) beep(880,0.12,0.3);
    if(rem<=0){clearInterval(RTI);el.classList.remove('on');finishBeep();toast(L==='ar'?'🎯 انتهت الراحة!':'🎯 Rest done!');}
  },1000);
}
function stopRT(){clearInterval(RTI);document.getElementById('rtbar').classList.remove('on');}

    showMain();
  } else {
    document.getElementById('pg-splash').classList.add('on');
  }
  setInterval(()=>{
    if(document.getElementById('pg-main').classList.contains('on')) save();
  },30000);
});

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').then(reg=>reg.update()).catch(()=>{});
}
</script>
</body>
</html>
