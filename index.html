<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#0a0a14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitFuel">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.jpg">
<title>FitFuel 🏋️</title>
<style>
/* ── DESIGN TOKENS ──────────────────────────────────────── */
:root{
  --bg:#0d0d18;--s1:#13131f;--s2:#1a1a2e;--s3:#22223a;--s4:#2a2a46;
  --ac:#c8f53a;--acd:rgba(200,245,58,.13);--acg:linear-gradient(135deg,#c8f53a,#8ed010);
  --bl:#4db8ff;--bld:rgba(77,184,255,.13);
  --pk:#ff4d8f;--pkd:rgba(255,77,143,.13);
  --or:#ff9444;--ord:rgba(255,148,68,.13);
  --gd:#ffd700;--gdd:rgba(255,215,0,.13);
  --tx:#f0f0fa;--tx2:#a0a0c0;--mt:#525270;--br:#252540;--br2:#1c1c34;
  --r:16px;--r2:12px;
  --sh:0 4px 24px rgba(0,0,0,.45);--sh2:0 2px 12px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
input,select,button{font-family:inherit;font-size:inherit}

/* ── LAYOUT ───────────────────────────────────────────── */
.page{position:fixed;inset:0;overflow-y:auto;display:none;flex-direction:column;padding-bottom:96px;scroll-behavior:smooth}
.page.on{display:flex}
.wrap{width:100%;max-width:480px;margin:0 auto;padding:0 18px}

/* ── BUTTONS ──────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:16px 28px;border-radius:50px;border:none;cursor:pointer;font-size:17px;font-weight:700;letter-spacing:.2px;transition:transform .15s,box-shadow .15s;box-shadow:var(--sh2)}
.btn:active{transform:scale(.95)}
.bp{background:var(--acg);color:#0a0a10;box-shadow:0 4px 20px rgba(200,245,58,.28)}
.bo{background:var(--s3);border:1.5px solid var(--br);color:var(--tx2)}
.bo:hover,.bo:focus{border-color:var(--ac);color:var(--ac)}
.bw{width:100%}

/* ── BADGES ───────────────────────────────────────────── */
.bdg{display:inline-flex;align-items:center;padding:5px 13px;border-radius:50px;font-size:13px;font-weight:700;letter-spacing:.2px}
.bg{background:var(--acd);color:var(--ac)}.bb{background:var(--bld);color:var(--bl)}
.bpk{background:var(--pkd);color:var(--pk)}.bor{background:var(--ord);color:var(--or)}.bgd{background:var(--gdd);color:var(--gd)}

/* ── CARDS ────────────────────────────────────────────── */
.card{background:var(--s2);border:1px solid var(--br2);border-radius:var(--r);padding:20px;margin-bottom:14px;box-shadow:var(--sh2)}
.tag{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--mt)}
.mt{color:var(--mt)}

/* ── TOAST ────────────────────────────────────────────── */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--s3);border:1.5px solid var(--ac);color:var(--ac);padding:12px 22px;border-radius:50px;font-size:15px;font-weight:700;z-index:9999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none;max-width:92vw;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.toast.on{transform:translateX(-50%) translateY(0)}
.savfl{position:fixed;bottom:104px;right:16px;background:var(--acd);border:1px solid var(--ac);color:var(--ac);padding:6px 14px;border-radius:50px;font-size:12px;font-weight:700;z-index:400;opacity:0;transition:opacity .3s;pointer-events:none}
[dir=ltr] .savfl{right:auto;left:16px}
.savfl.on{opacity:1}

/* ── REST TIMER ───────────────────────────────────────── */
.rtbar{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--s2);border:2px solid var(--bl);border-radius:50px;padding:12px 28px;font-size:15px;font-weight:800;color:var(--bl);z-index:400;display:none;align-items:center;gap:12px;cursor:pointer;box-shadow:0 4px 20px rgba(77,184,255,.25)}
.rtbar.on{display:flex}
.rtn{font-size:32px;font-weight:900;min-width:44px;text-align:center;font-variant-numeric:tabular-nums}

/* ── SPLASH ───────────────────────────────────────────── */
#pg-splash{align-items:center;justify-content:center;text-align:center;padding:48px 24px;background:radial-gradient(ellipse at 50% 30%,rgba(200,245,58,.06) 0%,transparent 70%)}
.logo{font-size:72px;font-weight:900;letter-spacing:5px;background:linear-gradient(135deg,var(--ac),var(--bl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.lrow{display:flex;gap:10px;justify-content:center;margin-bottom:28px}
.lbtn{padding:13px 28px;border-radius:50px;border:2px solid var(--br);background:var(--s2);color:var(--tx2);font-size:16px;font-weight:700;cursor:pointer;transition:all .2s}
.lbtn.on{border-color:var(--ac);color:var(--ac);background:var(--acd);box-shadow:0 0 20px rgba(200,245,58,.15)}

/* ── SETUP ────────────────────────────────────────────── */
#pg-setup{padding:28px 0 100px}
.prog{display:flex;gap:6px;justify-content:center;margin-bottom:28px}
.prg{height:5px;width:48px;border-radius:3px;background:var(--br);transition:all .3s}
.prg.d{background:var(--ac)}.prg.c{background:var(--ac);box-shadow:0 0 10px var(--ac)}
.step{display:none}.step.on{display:block}
.fl{margin-bottom:14px}
.lb{font-size:14px;color:var(--tx2);font-weight:600;margin-bottom:7px;display:block}
.fi{width:100%;background:var(--s3);border:2px solid var(--br);color:var(--tx);border-radius:var(--r2);padding:16px;font-size:17px;outline:none;transition:border-color .2s,box-shadow .2s}
.fi:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(200,245,58,.1)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g1{display:flex;flex-direction:column;gap:9px}
.oc{padding:14px 12px;border-radius:var(--r2);border:2px solid var(--br);background:var(--s2);cursor:pointer;text-align:center;transition:all .18s}
.oc:active{transform:scale(.97)}
.oc.on{border-color:var(--ac);background:var(--acd);box-shadow:0 0 16px rgba(200,245,58,.1)}
.oc-h{display:flex;align-items:center;gap:12px;text-align:start}
.oi{font-size:26px;flex-shrink:0}
.ol{font-size:16px;font-weight:700;color:var(--tx)}.os{font-size:13px;color:var(--mt);margin-top:2px}
.nb{display:flex;gap:10px;margin-top:22px}
.ig2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── BOTTOM NAV ───────────────────────────────────────── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--s1);border-top:1px solid var(--br2);display:flex;z-index:300;padding:10px 0 14px;box-shadow:0 -4px 24px rgba(0,0,0,.45)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px 4px;border:none;background:transparent;color:var(--mt);transition:color .18s}
.ni.on{color:var(--ac)}
.ni-ic{font-size:26px}
.ni-lb{font-size:12px;font-weight:700;letter-spacing:.3px}

/* ── HOME ─────────────────────────────────────────────── */
.hero{background:linear-gradient(145deg,var(--s3),var(--s2));border:1px solid var(--br);border-radius:var(--r);padding:20px;margin-bottom:14px;box-shadow:var(--sh)}
.ringwrap{display:flex;align-items:center;gap:18px;margin-top:10px}
.rsvg{width:90px;height:90px;flex-shrink:0}
.rbg2{fill:none;stroke:var(--br);stroke-width:7}
.rfl{fill:none;stroke:var(--ac);stroke-width:7;stroke-linecap:round;stroke-dasharray:220;stroke-dashoffset:220;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset 1.2s ease;filter:drop-shadow(0 0 6px rgba(200,245,58,.4))}
.mbars{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.mb{background:var(--s1);border-radius:10px;padding:10px 8px;text-align:center;border:1px solid var(--br2)}
.mb-l{font-size:11px;color:var(--mt);font-weight:700;margin-bottom:3px;letter-spacing:.3px;text-transform:uppercase}
.mb-v{font-size:17px;font-weight:900}
.mbar{height:4px;background:var(--br);border-radius:2px;margin-top:5px;overflow:hidden}
.mbf{height:100%;border-radius:2px;transition:width 1s}
.logrow{display:flex;gap:8px}
.litems{display:flex;flex-direction:column;gap:7px;margin-top:10px;max-height:170px;overflow-y:auto}
.li{display:flex;justify-content:space-between;align-items:center;background:var(--s3);border-radius:10px;padding:10px 14px;border:1px solid var(--br2)}
.li-del{background:none;border:none;color:var(--mt);cursor:pointer;font-size:18px;padding:0 4px}

/* ── RAMADAN BANNER ───────────────────────────────────── */
.rbanner{background:linear-gradient(145deg,var(--s3),var(--s2));border:1px solid rgba(255,215,0,.18);border-radius:var(--r);padding:16px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:var(--sh2)}
.rtoggle{border:2px solid var(--gd);color:var(--gd);background:var(--gdd);border-radius:50px;padding:8px 18px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.rtoggle.off{border-color:var(--br);color:var(--mt);background:transparent}
.twc{background:var(--s2);border:1px solid var(--br2);border-radius:var(--r);padding:16px;cursor:pointer;transition:border-color .2s,box-shadow .2s;box-shadow:var(--sh2)}
.twc:active{border-color:var(--ac)}

/* ── WORKOUT ──────────────────────────────────────────── */
.dayplan{display:flex;overflow-x:auto;gap:8px;padding:4px 0 10px;scrollbar-width:none}
.dayplan::-webkit-scrollbar{display:none}
.dpc{padding:10px 12px;border-radius:var(--r2);border:2px solid var(--br);background:var(--s2);color:var(--mt);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .18s;text-align:center;min-width:68px}
.dpc.on{border-color:var(--ac);color:var(--ac);background:var(--acd);box-shadow:0 0 12px rgba(200,245,58,.15)}
.dpc.done{border-color:var(--pk);color:var(--pk)}.dpc.rest{border-color:var(--bl);color:var(--bl)}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:10px}
.pgst{text-align:center;background:var(--s3);border-radius:var(--r2);padding:14px 8px;border:1px solid var(--br2)}
.pgst-v{font-size:24px;font-weight:900;color:var(--ac)}
.pgst-l{font-size:12px;color:var(--mt);font-weight:700;margin-top:3px}
.wsec-t{display:flex;align-items:center;gap:10px;margin:18px 0 10px}
.wsec-l{flex:1;height:1px;background:var(--br)}
.excard{background:var(--s2);border:1px solid var(--br2);border-radius:var(--r);overflow:hidden;margin-bottom:10px;box-shadow:var(--sh2);transition:border-color .2s}
.excard.exp{border-color:var(--bl);box-shadow:0 4px 20px rgba(77,184,255,.12)}
.exhdr{display:flex;gap:14px;align-items:center;padding:16px;cursor:pointer}
.exgif{width:68px;height:68px;border-radius:12px;overflow:hidden;flex-shrink:0;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:30px;border:1px solid var(--br2)}
.exgif img{width:100%;height:100%;object-fit:cover}
.exnm{font-size:17px;font-weight:800;margin-bottom:5px;color:var(--tx)}
.mtag{padding:4px 10px;border-radius:50px;font-size:12px;font-weight:700;background:var(--pkd);color:var(--pk)}
.exchv{font-size:14px;color:var(--mt);margin-inline-start:auto;transition:transform .25s;flex-shrink:0}
.excard.exp .exchv{transform:rotate(180deg)}
.exbody{display:none;padding:16px;border-top:1px solid var(--br2)}
.excard.exp .exbody{display:block}
.exdg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.exd{background:var(--s3);border-radius:var(--r2);padding:12px;text-align:center;border:1px solid var(--br2)}
.exd-v{font-size:20px;font-weight:900;color:var(--bl)}
.exd-l{font-size:12px;color:var(--mt);font-weight:700;margin-top:3px}
.tips{background:var(--s3);border-radius:var(--r2);padding:14px;margin-top:10px;border:1px solid var(--br2)}
.tips-t{font-size:13px;color:var(--ac);font-weight:800;margin-bottom:8px;letter-spacing:.3px}
.tips ul{padding-inline-start:16px}
.tips li{font-size:14px;color:var(--tx2);margin-bottom:5px;line-height:1.6}
.done-btn{width:100%;margin-top:16px;padding:19px;font-size:18px;letter-spacing:.3px}
.done-btn.cmp{background:var(--acd)!important;color:var(--ac)!important;border:2px solid var(--ac)!important;cursor:default!important;box-shadow:none!important}
.lvlrow{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}

/* ── MEALS ────────────────────────────────────────────── */
.daysel{display:flex;overflow-x:auto;gap:8px;padding:4px 0 10px;scrollbar-width:none}
.daysel::-webkit-scrollbar{display:none}
.dpill{padding:10px 18px;border-radius:50px;border:2px solid var(--br);background:var(--s2);color:var(--tx2);font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .18s}
.dpill.on{border-color:var(--ac);color:var(--ac);background:var(--acd)}
.mode-sw{display:flex;gap:8px;margin-bottom:12px}
.msw{flex:1;padding:13px;border-radius:50px;border:2px solid var(--br);background:transparent;color:var(--tx2);font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.msw.rm{border-color:var(--gd);color:var(--gd);background:var(--gdd)}
.msw.nm{border-color:var(--ac);color:var(--ac);background:var(--acd)}
.dtbar{background:var(--s2);border:1px solid var(--br2);border-radius:var(--r);padding:16px 18px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--sh2)}
.mcard{background:var(--s2);border:1px solid var(--br2);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:var(--sh2)}
.mc-hdr{padding:16px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;gap:10px}
.mc-nm{font-size:18px;font-weight:800;margin-top:4px;line-height:1.3;color:var(--tx)}
.mc-body{display:none;padding:16px 18px;border-top:1px solid var(--br2)}
.mcard.exp .mc-body{display:block}
.mmac{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.mpill{padding:5px 12px;border-radius:50px;font-size:14px;font-weight:700}
.ing-i{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--br2);font-size:15px;line-height:1.6;color:var(--tx2)}
.ing-i:last-child{border:none}
.ing-i::before{content:"•";color:var(--ac);font-size:18px;flex-shrink:0;line-height:1.4}
.minstr{background:var(--s3);border-radius:var(--r2);padding:14px;margin-top:10px;font-size:14px;color:var(--tx2);line-height:1.7;border:1px solid var(--br2)}
.mactions{display:flex;gap:8px;margin-top:12px}
.mactions .btn{flex:1;padding:14px;font-size:15px}

/* ── PROFILE ──────────────────────────────────────────── */
.profav{width:80px;height:80px;border-radius:50%;background:var(--acg);display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:900;color:#0a0a10;margin:0 auto 12px;box-shadow:0 4px 24px rgba(200,245,58,.3)}
.pstats{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.pst{background:var(--s2);border:1px solid var(--br2);border-radius:var(--r);padding:16px;text-align:center;box-shadow:var(--sh2)}
.pst-v{font-size:22px;font-weight:900;color:var(--ac)}
.pst-l{font-size:12px;color:var(--mt);font-weight:700;margin-top:3px;text-transform:uppercase;letter-spacing:.4px}
.hist-i{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--s3);border-radius:var(--r2);margin-bottom:7px;border:1px solid var(--br2)}
.alarm-i{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--s3);border-radius:var(--r2);margin-bottom:7px;border:1px solid var(--br2)}
.altime{font-size:20px;font-weight:900;color:var(--gd);font-variant-numeric:tabular-nums}
.tsw{position:relative;width:46px;height:26px;cursor:pointer;flex-shrink:0}
.tsw input{opacity:0;width:0;height:0}
.tsl{position:absolute;inset:0;background:var(--br);border-radius:34px;transition:.3s;cursor:pointer}
.tsl:before{content:"";position:absolute;height:18px;width:18px;left:4px;bottom:4px;background:var(--mt);border-radius:50%;transition:.3s}
input:checked+.tsl{background:var(--ac)}
input:checked+.tsl:before{transform:translateX(20px);background:#0a0a10}
.lang-sw{display:flex;gap:8px}
.lsw{flex:1;padding:13px;border-radius:50px;border:2px solid var(--br);background:transparent;color:var(--tx2);font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.lsw.on{border-color:var(--ac);color:var(--ac);background:var(--acd)}
.mov{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px)}
.mov.on{display:flex}
.modal{background:var(--s1);border:1px solid var(--br);border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:24px 20px;max-height:88vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.6)}
.mcls{float:inline-end;background:var(--s3);border:none;color:var(--tx2);font-size:18px;cursor:pointer;width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center}
.rstbtn{width:100%;padding:15px;border-radius:var(--r2);border:2px solid var(--br);background:transparent;color:var(--mt);font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s}
.rstbtn:hover{border-color:var(--pk);color:var(--pk);background:var(--pkd)}

/* ── PRAYER (Ramadan mode) ───────────────────────────── */
.ptcard{background:linear-gradient(145deg,#160f28,#1e1438);border:1px solid rgba(255,215,0,.18);border-radius:var(--r);padding:16px 18px;margin-bottom:14px;box-shadow:var(--sh)}
.ptrow{display:flex;gap:7px;margin-top:10px}
.ptime{flex:1;background:rgba(0,0,0,.3);border-radius:var(--r2);padding:10px 6px;text-align:center;border:1px solid transparent;transition:all .2s}
.ptime-v{font-size:16px;font-weight:900;color:var(--gd);font-variant-numeric:tabular-nums}
.ptime-l{font-size:11px;color:var(--mt);font-weight:700;margin-top:2px}
.ptime.nx{border-color:var(--gd);background:var(--gdd)}
.ptime.nx .ptime-l{color:var(--gd)}
.ptcnt{font-size:14px;color:var(--gd);font-weight:700;text-align:center;margin-top:9px}
.ptsrc{font-size:11px;color:var(--mt);text-align:center;margin-top:3px}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="savfl" id="savfl">💾</div>
<div class="rtbar" id="rtbar" onclick="stopRT()">⏱ <span class="rtn" id="rtn">60</span>s</div>

<!-- SPLASH -->
<div class="page" id="pg-splash">
  <div style="font-size:56px;margin-bottom:12px">🏋️</div>
  <div class="logo">FITFUEL</div>
  <div style="font-size:14px;color:var(--mt);letter-spacing:2px;margin:6px 0 24px">KETTLEBELL · NUTRITION · RAMADAN</div>
  <div class="lrow">
    <button class="lbtn on" onclick="setL('ar',this)">العربية</button>
    <button class="lbtn" onclick="setL('en',this)">English</button>
  </div>
  <button class="btn bp" style="padding:15px 52px;font-size:17px" onclick="startApp()" id="sp-btn">ابدأ 🚀</button>
</div>

<!-- SETUP -->
<div class="page" id="pg-setup">
<div class="wrap" style="padding-top:28px">
  <div class="prog" id="prog"></div>
  <div class="step" id="s1">
    <div style="font-size:20px;font-weight:900;margin-bottom:3px" id="s1t">—</div>
    <div style="font-size:15px;color:var(--mt);margin-bottom:14px" id="s1s">—</div>
    <div class="fl"><label class="lb" id="l-nm">—</label><input class="fi" id="i-nm" type="text"></div>
    <div class="ig2">
      <div class="fl"><label class="lb" id="l-ag">—</label><input class="fi" id="i-ag" type="number" min="10" max="80" placeholder="25"></div>
      <div class="fl"><label class="lb" id="l-gn">—</label>

// CALORIE CALCULATION (fixed — no scientific notation)
// ============================================================
function calcCal(){
  const w=Number(P.weight)||70, h=Number(P.height)||170,
        a=Number(P.age)||25, act=Number(P.activity)||1.2;
  // Mifflin-St Jeor
  let bmr = P.gender==='female'
    ? (10*w)+(6.25*h)-(5*a)-161
    : (10*w)+(6.25*h)-(5*a)+5;
  let tdee = bmr * act;
  let target = tdee;
  if(P.goal==='lose') target = tdee - 400;
  else if(P.goal==='gain') target = tdee + 250;
  else if(P.goal==='fit') target = tdee - 150;
  // Round all to integers
  P.targetCal = Math.round(target);
  P.tdee      = Math.round(tdee);
  P.bmr       = Math.round(bmr);
  P.protG     = Math.round(w * 1.8);
  P.carbG     = Math.round(P.targetCal * 0.42 / 4);
  P.fatG      = Math.round(P.targetCal * 0.28 / 9);
}

// PRAYER TIMES — Uses adhan.js (same engine as Salaat First / Muslim Pro)
// 100% offline calculation. Loaded once from CDN, cached by browser.
// ============================================================
function addM(tstr, m){
  if(!tstr) return '--:--';
  const[h,mn]=tstr.split(':').map(Number);
  let tm=h*60+mn+m; if(tm<0)tm+=1440; if(tm>=1440)tm-=1440;
  return String(Math.floor(tm/60)).padStart(2,'0')+':'+String(tm%60).padStart(2,'0');
}
function t2m(tstr){ if(!tstr||tstr==='--:--')return-1; const[h,m]=tstr.split(':').map(Number); return h*60+m; }
function cleanT(raw){ return (raw||'--:--').replace(/\s.*/,'').substring(0,5); }

function to12h(t24){
  if(!t24||t24==='--:--') return '--:--';
  let [h,m]=t24.split(':').map(Number);
  const ampm=h>=12?(L==='ar'?'م':'PM'):(L==='ar'?'ص':'AM');
  h=h%12||12;
  return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
}

function fmt(date){
  // format a Date object to HH:MM local time string
  const h=date.getHours(), m=date.getMinutes();
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
}

let _adhanReady=false;
function loadAdhan(){
  return new Promise(resolve=>{
    if(window.adhan){resolve(true);return;}
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/adhan@4.4.3/lib/adhan.min.js';
    s.onload=()=>{_adhanReady=true;resolve(true);};
    s.onerror=()=>resolve(false);
    document.head.appendChild(s);
  });
}

function calcWithAdhan(lat,lng){
  try{
    const coords=new adhan.Coordinates(lat,lng);
    const date=new Date();
    // MuslimWorldLeague method — used by most apps for Morocco
    const params=adhan.CalculationMethod.MuslimWorldLeague();
    params.madhab=adhan.Madhab.Shafi; // standard asr timing
    const pt=new adhan.PrayerTimes(coords,date,params);
    return{
      fajr:fmt(pt.fajr),
      sunrise:fmt(pt.sunrise),
      dhuhr:fmt(pt.dhuhr),
      asr:fmt(pt.asr),
      maghrib:fmt(pt.maghrib),
      isha:fmt(pt.isha),
    };
  }catch(e){return null;}
}

// Fallback: pure-JS astronomical calculation (no library needed)
function calcFallback(lat, lng) {
  const DEG = Math.PI / 180;
  const date = new Date();
  const tzOff = -date.getTimezoneOffset() / 60;

  // Julian Day Number
  let y = date.getFullYear(), mo = date.getMonth() + 1, d = date.getDate();
  if (mo <= 2) { y--; mo += 12; }
  const A = Math.floor(y / 100), B = 2 - A + Math.floor(A / 4);
  const jd = Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (mo + 1)) + d + B - 1524.5;

  const D = jd - 2451545.0;

  // Sun's mean anomaly & mean longitude (degrees)
  const g = (357.529 + 0.98560028 * D) % 360;
  const q = (280.459 + 0.98564736 * D) % 360;

  // Ecliptic longitude (degrees)
  const L2 = (q + 1.915 * Math.sin(g * DEG) + 0.02 * Math.sin(2 * g * DEG)) % 360;

  // Obliquity of ecliptic
  const e = (23.439 - 0.00000036 * D) * DEG;

  // Declination
  const dec = Math.asin(Math.sin(e) * Math.sin(L2 * DEG));

  // Right Ascension (hours)
  let RA = Math.atan2(Math.cos(e) * Math.sin(L2 * DEG), Math.cos(L2 * DEG)) / DEG / 15;
  if (RA < 0) RA += 24;

  // Equation of time (hours)
  const eqt = q / 15 - RA;

  // Solar noon in local time
  const transit = 12 - lng / 15 + tzOff - eqt;

  // Hour angle for a given altitude angle (degrees)
  function ha(angle) {
    const cosH = (-Math.sin(angle * DEG) - Math.sin(dec) * Math.sin(lat * DEG))
                 / (Math.cos(dec) * Math.cos(lat * DEG));
    if (cosH < -1 || cosH > 1) return null;
    return Math.acos(cosH) / DEG / 15; // hours
  }

  function toHM(hours) {
    if (hours === null) return '--:--';
    hours = ((hours % 24) + 24) % 24;
    const hh = Math.floor(hours);
    const mm = Math.round((hours - hh) * 60);
    if (mm === 60) return String(hh + 1).padStart(2, '0') + ':00';
    return String(hh).padStart(2, '0') + ':' + String(mm).padStart(2, '0');
  }

  // Angles: Fajr 18° (Muslim World League), Maghrib at 0.833° (refraction+disc), Isha 17°
  const fHA = ha(18);
  const mHA = ha(0.833);
  const iHA = ha(17);

  return {
    fajr:    toHM(fHA !== null ? transit - fHA : null),
    maghrib: toHM(mHA !== null ? transit + mHA : null),
    isha:    toHM(iHA !== null ? transit + iHA : null),
  };
}

async function getCoords(){
  // If user manually picked a city, use it
  const city=getCityCoords();
  if(city) return {lat:city.lat, lng:city.lng, fromCity:true};
  // Otherwise try browser GPS
  return new Promise((resolve)=>{
    if(!navigator.geolocation){resolve(null);return;}
    navigator.geolocation.getCurrentPosition(
      pos=>resolve({lat:pos.coords.latitude,lng:pos.coords.longitude}),
      ()=>resolve(null),
      {timeout:5000,maximumAge:3600000}
    );
  });
}

async function fetchPT(){
  const today=new Date();
  const todayStr=today.toDateString();
  if(_cachedPT&&_cachedPT.date===todayStr) return _cachedPT;

  const coords=await Promise.race([
    getCoords(),
    new Promise(r=>setTimeout(()=>r(null),4000))
  ]);

  const lat=coords?coords.lat:33.5731;
  const lng=coords?coords.lng:-7.5898;
  const fromCity=coords&&coords.fromCity;

  // Try adhan.js (most accurate, same engine as Salaat First)
  let times=null;
  const adhanLoaded=await loadAdhan();
  if(adhanLoaded) times=calcWithAdhan(lat,lng);
  if(!times) times=calcFallback(lat,lng);

  const fajr=times.fajr||'--:--';
  const magh=times.maghrib||'--:--';
  const isha=times.isha||'--:--';

  let src;
  if(fromCity) src='city';
  else if(coords) src='gps';
  else src='default';

  _cachedPT={fajr,maghrib:magh,isha,suhoor:addM(fajr,-35),workout:addM(magh,90),date:todayStr,src};
  try{localStorage.setItem('ff7_pt',JSON.stringify(_cachedPT));}catch(e){}
  return _cachedPT;
}

function getPT(){
  if(_cachedPT&&_cachedPT.fajr) return _cachedPT;
  const t=calcFallback(33.5731,-7.5898);
  return{fajr:t.fajr||'--:--',maghrib:t.maghrib||'--:--',isha:t.isha||'--:--',
         suhoor:addM(t.fajr,-35),workout:addM(t.maghrib,90),src:'calc'};
}

function rPrayerCard(){
  if(!isRamadan){document.getElementById('ptcard').style.display='none';return;}
  document.getElementById('ptcard').style.display='block';
  const pt=getPT();
  const now=new Date();
  const months_ar=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  const months_en=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const days_ar=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  const days_en=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const ds=L==='ar'?days_ar:days_en, ms=L==='ar'?months_ar:months_en;
  document.getElementById('pt-date').textContent=`${ds[now.getDay()]} ${now.getDate()} ${ms[now.getMonth()]} ${now.getFullYear()}`;
  document.getElementById('pt-tag').textContent=t('pt-tag');
  const items=[
    {k:'maghrib',lbl:t('pt-maghrib'),tm:pt.maghrib,ic:'🌅'},
    {k:'isha',lbl:t('pt-isha'),tm:pt.isha,ic:'🌙'},
    {k:'suhoor',lbl:t('pt-suhoor'),tm:pt.suhoor,ic:'⭐'}
  ];
  const nowMin=now.getHours()*60+now.getMinutes();
  let nextIdx=-1;
  items.forEach((x,i)=>{ if(nextIdx===-1&&t2m(x.tm)>nowMin) nextIdx=i; });
  document.getElementById('ptrow').innerHTML=items.map((x,i)=>`
    <div class="ptime${i===nextIdx?' nx':''}">
      <div style="font-size:15px">${x.ic}</div>
      <div class="ptime-v">${to12h(x.tm)}</div>
      <div class="ptime-l">${x.lbl}</div>
    </div>`).join('');
  if(nextIdx>=0){
    const nx=items[nextIdx];
    const [th,tm2]=nx.tm.split(':').map(Number);
    const tgtSec = th*3600 + tm2*60;
    const nowSec = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
    let diffSec = tgtSec - nowSec;
    if(diffSec < 0) diffSec += 86400; // handle midnight rollover
    const dh=Math.floor(diffSec/3600);
    const dm=Math.floor((diffSec%3600)/60);
    const ds=diffSec%60;
    const badge = dh>0 ? `${dh}h ${dm}m` : dm>0 ? `${dm}m ${ds}s` : `${ds}s`;
    document.getElementById('pt-badge').textContent=badge;
    const full = dh>0
      ? `${dh}${t('h-label')} ${dm}${t('m-label')} ${ds}s`
      : `${dm}${t('m-label')} ${ds}s`;
    document.getElementById('ptcnt').textContent=t('countdown-to')+nx.lbl+': '+full;
  } else {
    document.getElementById('pt-badge').textContent=t('day-done');
    document.getElementById('ptcnt').textContent='';
  }
  const srcMap={live:t('ptsrc-live'),cache:t('ptsrc-cache'),fallback:t('ptsrc-fallback'),calc:t('ptsrc-calc'),gps:t('ptsrc-gps'),city:t('ptsrc-city'),default:t('ptsrc-default'),'gps-fb':t('ptsrc-gps-fb'),'calc-fb':t('ptsrc-calc-fb')};
  document.getElementById('ptsrc').textContent=srcMap[pt.src||'default']||'';
}

function startPTLoop(){
  if(_CTD)clearInterval(_CTD);
  if(window._CTD2)clearInterval(window._CTD2);
  // Fetch fresh prayer times immediately
  fetchPT().then(()=>rPrayerCard());
  // Re-fetch once per hour (cache handles same-day deduplication)
  _CTD=setInterval(()=>{ _cachedPT=null; fetchPT().then(()=>rPrayerCard()); },3600000);
  // Tick every second so the countdown is live
  window._CTD2=setInterval(()=>{ rPrayerCard(); },1000);
}

function rHome(){
  if(!P.name) return;
  applyLang();
  document.getElementById('hm-gr').textContent=t('hm-gr');

  const key=new Date().toDateString();
  if(!DLOG[key]) DLOG[key]={foods:[],tCal:0,tP:0,tC:0,tF:0};
  const log=DLOG[key];
  const target=P.targetCal||2000, consumed=log.tCal||0;
  const pct=Math.min(consumed/target,1);
  document.getElementById('rfl').style.strokeDashoffset=220-(pct*220);
  document.getElementById('r-num').textContent=consumed;
  document.getElementById('r-lbl').textContent='/'+target;
  document.getElementById('cv1').textContent=target+' kcal';
  document.getElementById('cv2').textContent=consumed+' kcal';
  document.getElementById('cv3').textContent=Math.max(0,target-consumed)+' kcal';
  document.getElementById('mb1v').textContent=(log.tP||0)+'g';
  document.getElementById('mb1f').style.width=Math.min((log.tP||0)/(P.protG||1)*100,100)+'%';
  document.getElementById('mb2v').textContent=(log.tC||0)+'g';
  document.getElementById('mb2f').style.width=Math.min((log.tC||0)/(P.carbG||1)*100,100)+'%';
  document.getElementById('mb3v').textContent=(log.tF||0)+'g';
  document.getElementById('mb3f').style.width=Math.min((log.tF||0)/(P.fatG||1)*100,100)+'%';
  rLogItems(); rTWCard();
}
function rLogItems(){
  const key=new Date().toDateString(), log=DLOG[key];
  const el=document.getElementById('litems');
  if(!log||!log.foods.length){el.innerHTML='';return;}
  el.innerHTML=log.foods.map((f,i)=>`
    <div class="li">
      <span style="font-size:15px;font-weight:600">${f.name}</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:14px;font-weight:800;color:var(--ac)">${f.cal} kcal</span>
        <button class="li-del" onclick="delLog(${i})">✕</button>
      </div>
    </div>`).join('');
}
function logFood(){
  const nm=document.getElementById('log-nm').value.trim();
  const cl=Math.round(+document.getElementById('log-cl').value);
  if(!nm||!cl||cl<=0){toast(t('toast-logfill'));return;}
  const key=new Date().toDateString();
  if(!DLOG[key]) DLOG[key]={foods:[],tCal:0,tP:0,tC:0,tF:0};
  const p=Math.round(cl*0.25/4), c2=Math.round(cl*0.45/4), f=Math.round(cl*0.30/9);
  DLOG[key].foods.push({name:nm,cal:cl,p,c:c2,f});
  DLOG[key].tCal=(DLOG[key].tCal||0)+cl;
  DLOG[key].tP=(DLOG[key].tP||0)+p;
  DLOG[key].tC=(DLOG[key].tC||0)+c2;
  DLOG[key].tF=(DLOG[key].tF||0)+f;
  document.getElementById('log-nm').value='';
  document.getElementById('log-cl').value='';
  save(); rHome();
}
function delLog(i){
  const key=new Date().toDateString(), f=DLOG[key].foods[i];
  DLOG[key].tCal-=f.cal; DLOG[key].tP-=f.p; DLOG[key].tC-=f.c; DLOG[key].tF-=f.f;
  DLOG[key].foods.splice(i,1); save(); rHome();
}
function logMeal(cal,nm){
  const key=new Date().toDateString();
  if(!DLOG[key]) DLOG[key]={foods:[],tCal:0,tP:0,tC:0,tF:0};
  cal=Math.round(+cal);
  const p=Math.round(cal*0.28/4), c2=Math.round(cal*0.42/4), f=Math.round(cal*0.30/9);
  DLOG[key].foods.push({name:nm,cal,p,c:c2,f});
  DLOG[key].tCal=(DLOG[key].tCal||0)+cal;
  DLOG[key].tP=(DLOG[key].tP||0)+p;
  DLOG[key].tC=(DLOG[key].tC||0)+c2;
  DLOG[key].tF=(DLOG[key].tF||0)+f;
  save(); rHome(); toast('✅ '+nm+' — '+cal+' kcal');
}

function shuf(a){for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function getPool(type){
  if(type==='rest') return [];
  const lv=P.level||'beginner';
  const src=(EX[type]&&(EX[type][lv]||EX[type].beginner))||[];
  return shuf([...src]).slice(0,4);
}
function genWK(regen){
  const type=WEEK[new Date().getDay()], il=Math.min(P.intensity||1,5);
  _WP = type==='rest' ? {type:'rest'} :
    {type, main:getPool(type), warmup:shuf([...EX.warmup]).slice(0,2), cooldown:[...EX.cooldown], intensity:il};
  if(regen){save(); toast(t('toast-newses'));}
  rWorkout(); rTWCard();
}
function rTWCard(){
  if(!_WP) return;
  const lv=P.level||'beginner', il=P.intensity||1;
  const lvMap={beginner:t('lv-beginner'),intermediate:t('lv-intermediate'),advanced:t('lv-advanced')};
  document.getElementById('tw-lv').textContent=lvMap[lv]||lv;
  document.getElementById('tw-nm').textContent=t('wtype-'+_WP.type)||_WP.type;
  if(_WP.type==='rest'){
    document.getElementById('tw-d').textContent=L==='ar'?'راحة':'Rest';
    document.getElementById('tw-e').textContent='—';
    document.getElementById('tw-c').textContent='—'; return;
  }
  const sk=String(Math.min(il,5));
  const burn=(_WP.main||[]).reduce((s,e)=>{
    const pts=(e.s&&e.s[sk])||'3×10'; return s+(e.cal||8)*parseInt(pts);},0);
  document.getElementById('tw-d').textContent=(25+il*5)+(L==='ar'?' دقيقة':' min');
  document.getElementById('tw-e').textContent=(_WP.main||[]).length+' '+(L==='ar'?'تمارين':'exercises');
  document.getElementById('tw-c').textContent='~'+burn+' kcal';
}
function rWorkout(){
  if(!P.name) return;
  const lv=P.level||'beginner', il=P.intensity||1;
  document.getElementById('wk-tag').textContent=t('wk-tag');
  document.getElementById('wk-ti').textContent=t('wk-ti');
  document.getElementById('pg-t').textContent=t('pg-t');
  document.getElementById('pg1l').textContent=t('pg1l');
  document.getElementById('pg2l').textContent=t('pg2l');
  document.getElementById('pg3l').textContent=t('pg3l');
  document.getElementById('regen-t').textContent=t('regen-t');
  document.getElementById('pg-bdg').textContent=(P.sessions||0)+' '+(L==='ar'?'جلسات':'sessions');
  document.getElementById('pg1').textContent=P.sessions||0;
  document.getElementById('pg2').textContent=P.streak||0;
  document.getElementById('pg3').textContent=il;
  const today=new Date().getDay();
  const dayN_ar=['أحد','إثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];
  const dayN_en=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dayN=L==='ar'?dayN_ar:dayN_en;
  const ticons={upper:'💪',lower:'🦵',full:'⚡',cardio:'🏃',rest:'😴'};
  document.getElementById('dayplan').innerHTML=WEEK.map((type,i)=>{
    const isDone=WH.some(h=>{const d=new Date(h.date);return d.getDay()===i&&(Date.now()-d)<7*86400000;});
    const cls=type==='rest'?' rest':isDone?' done':i===today?' on':'';
    return`<div class="dpc${cls}"><div style="font-size:20px">${ticons[type]||'🏋️'}</div><div>${dayN[i]}</div></div>`;
  }).join('');
  const lvMap={beginner:t('lv-beginner'),intermediate:t('lv-intermediate'),advanced:t('lv-advanced')};
  document.getElementById('lvlrow').innerHTML=`
    <div class="bdg ${lv==='beginner'?'bg':lv==='intermediate'?'bb':'bpk'}">${lvMap[lv]||lv}</div>
    <div class="bdg bor">⚡ ${il}/5</div>
    ${P.doneToday?`<div class="bdg bg">${t('done-today')}</div>`:''}`;
  if(!_WP){genWK(false);return;}
  if(_WP.type==='rest'){
    document.getElementById('wkcnt').innerHTML=`<div style="text-align:center;padding:32px 14px">
      <div style="font-size:52px">😴</div>
      <h2 style="margin-top:8px">${t('rest-day-msg')}</h2>
      <p class="mt" style="font-size:15px;margin-top:6px">${t('rest-day-sub')}</p></div>`;
    return;
  }
  const sk=String(Math.min(il,5));
  let h='';
  h+=`<div class="wsec-t"><div class="wsec-l"></div><div class="tag" style="color:var(--or)">${t('wu-label')}</div><div class="wsec-l"></div></div>`;
  (_WP.warmup||[]).forEach(e=>h+=exCard(e,null,sk));
  h+=`<div class="wsec-t"><div class="wsec-l"></div><div class="tag" style="color:var(--ac)">${t('wtype-'+_WP.type)}</div><div class="wsec-l"></div></div>`;
  (_WP.main||[]).forEach(e=>h+=exCard(e,e.s?e.s[sk]:null,sk));
  h+=`<div class="wsec-t"><div class="wsec-l"></div><div class="tag" style="color:var(--bl)">${t('cd-label')}</div><div class="wsec-l"></div></div>`;
  (_WP.cooldown||[]).forEach(e=>h+=exCard(e,null,sk));
  h+=P.doneToday
    ?`<button class="btn done-btn cmp" disabled>${t('done-cmp')}</button>`
    :`<button class="btn bp done-btn" onclick="cmpSession()">${t('done-btn')}</button>`;
  document.getElementById('wkcnt').innerHTML=h;
}

let RTI=null;
let _AC=null;
function getAC(){
  if(!_AC||_AC.state==='closed')
    _AC=new(window.AudioContext||window.webkitAudioContext)();
  if(_AC.state==='suspended') _AC.resume();
  return _AC;
}
function beep(freq,dur,vol){
  try{
    const ctx=getAC();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value=freq; o.type='sine';
    g.gain.setValueAtTime(vol||0.4,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start(ctx.currentTime); o.stop(ctx.currentTime+dur);
  }catch(e){}
}
function finishBeep(){
  try{
    const ctx=getAC();
    const now=ctx.currentTime;
    function tone(freq,t,dur,vol){
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=freq; o.type='sine';
      g.gain.setValueAtTime(0.001,now+t);
      g.gain.linearRampToValueAtTime(vol,now+t+0.02);
      g.gain.setValueAtTime(vol,now+t+dur-0.05);
      g.gain.linearRampToValueAtTime(0.001,now+t+dur);
      o.start(now+t); o.stop(now+t+dur+0.05);
    }
    // 4 short rising beeps
    tone(660,  0.00, 0.13, 0.5);
    tone(770,  0.22, 0.13, 0.55);
    tone(880,  0.44, 0.13, 0.6);
    tone(990,  0.66, 0.13, 0.65);
    // Long loud GO — 1.5 seconds with fade out at end
    tone(1320, 0.95, 1.5,  0.85);
  }catch(e){}
}
function startRT(evt,rv){
  evt.stopPropagation(); let s=parseInt(rv)||60; clearInterval(RTI);
  const el=document.getElementById('rtbar');
  let rem=s; document.getElementById('rtn').textContent=rem; el.classList.add('on');
  RTI=setInterval(()=>{
    rem--;
    document.getElementById('rtn').textContent=rem;
    // Last 10 seconds: short beep each second
    if(rem>0 && rem<=10) beep(880,0.12,0.3);
    if(rem<=0){
      clearInterval(RTI); el.classList.remove('on');
      finishBeep();
      toast(L==='ar'?'🎯 انتهت الراحة!':'🎯 Rest done!');
    }
  },1000);
}
function stopRT(){clearInterval(RTI);document.getElementById('rtbar').classList.remove('on');}
function cmpSession(){
  P.sessions=(P.sessions||0)+1;
  const today=new Date().toDateString();
  const lastD=P.lastWD?Math.floor((new Date()-new Date(P.lastWD))/86400000):99;
  P.streak=lastD<=1?(P.streak||0)+1:1;
  P.lastWD=today; P.doneToday=true;
  WH.unshift({date:today,level:P.level,type:_WP&&_WP.type,intensity:P.intensity||1,exs:(_WP&&_WP.main||[]).length});
  if(WH.length>20)WH.pop();
  if(P.sessions%5===0&&(P.intensity||1)<5){P.intensity=(P.intensity||1)+1;setTimeout(()=>toast(t('toast-lvlup')),600);}
  if(P.sessions===15&&P.level==='beginner'){P.level='intermediate';P.intensity=1;setTimeout(()=>toast(t('toast-interm')),1200);}
  if(P.sessions===30&&P.level==='intermediate'){P.level='advanced';P.intensity=1;setTimeout(()=>toast(t('toast-adv')),1200);}
  save(); toast(t('toast-done')); rWorkout(); rProfile(); rTWCard();
}

function rand(arr){return arr[0|Math.random()*arr.length];}
function scaleMeal(m,targetCal,frac){
  const cal=Math.round(m.cal||400);
  const r=Math.max(0.7,Math.min(1.5,(targetCal*frac)/cal));
  return{...m,cal:Math.round(cal*r),p:Math.round((m.p||0)*r),c:Math.round((m.c||0)*r),f:Math.round((m.f||0)*r)};
}
function buildDay(mode,targetCal){
  const tc=Math.round(targetCal)||2000;
  if(mode==='ramadan') return{mode,iftar:scaleMeal(rand(ML.ramadan.iftar),tc,.22),isha:scaleMeal(rand(ML.ramadan.isha),tc,.50),suhoor:scaleMeal(rand(ML.ramadan.suhoor),tc,.28)};
  return{mode,breakfast:scaleMeal(rand(ML.normal.breakfast),tc,.25),lunch:scaleMeal(rand(ML.normal.lunch),tc,.35),snack:scaleMeal(rand(ML.normal.snack),tc,.12),dinner:scaleMeal(rand(ML.normal.dinner),tc,.28)};
}
function genAllMeals(showToast){
  const tc=Math.round(P.targetCal)||2000;
  for(let d=0;d<7;d++) if(!MP[d]||MP[d].mode!==mealMode) MP[d]=buildDay(mealMode,tc);
  if(showToast) toast(t('toast-meals'));
  save(); rMeals();
}
function forceGenAllMeals(){
  const tc=Math.round(P.targetCal)||2000;
  for(let d=0;d<7;d++) MP[d]=buildDay(mealMode,tc);
  toast(t('toast-meals')); save(); rMeals();
}
function refreshMeal(mKey){
  if(!MP[CD]) return;
  const tc=Math.round(P.targetCal)||2000;
  const fracs={iftar:.22,isha:.50,suhoor:.28,breakfast:.25,lunch:.35,snack:.12,dinner:.28};
  const pool=mealMode==='ramadan'?ML.ramadan[mKey]:ML.normal[mKey];
  if(!pool) return;
  const cur=MP[CD][mKey]; let nxt,tries=0;
  do{nxt=rand(pool);tries++;}while(tries<10&&cur&&nxt.ar===cur.ar);
  MP[CD][mKey]=scaleMeal(nxt,tc,fracs[mKey]||.25);
  save(); rDayMeals(); toast(t('toast-meal1'));
}

function renderDailyChart(){
  const ar=L==='ar';
  const canvas=document.getElementById('dcChart');
  if(!canvas) return;
  document.getElementById('dc-t').textContent=ar?'📅 روتيني اليومي':'📅 Daily Routine';
  document.getElementById('dc-leg1').textContent=ar?'تمرين ✅':'Workout ✅';
  document.getElementById('dc-leg2').textContent=ar?'يوم راحة':'Rest day';

  // Build last 14 days
  const days=14;
  const today=new Date(); today.setHours(0,0,0,0);
  const bars=[];
  for(let i=days-1;i>=0;i--){
    const d=new Date(today); d.setDate(today.getDate()-i);
    const key=d.toDateString();
    const done=WH.some(h=>h.date===key);
    const dayName=ar
      ?['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'][d.getDay()]
      :['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
    bars.push({key,done,label:i===0?(ar?'اليوم':'Today'):dayName,isToday:i===0});
  }

  const doneCount=bars.filter(b=>b.done).length;
  document.getElementById('dc-sub').textContent=ar
    ?`${doneCount} تمرين من أصل ${days} يوم`
    :`${doneCount} workouts out of ${days} days`;

  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth||300, H=140;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  const padL=4,padR=4,padT=10,padB=28;
  const barW=Math.floor((W-padL-padR)/days);
  const gap=Math.max(2, Math.floor(barW*0.18));
  const bw=barW-gap;
  const maxH=H-padT-padB;

  bars.forEach((b,i)=>{
    const x=padL+i*barW;
    const barH=b.done?maxH:Math.round(maxH*0.22);
    const y=padT+(maxH-barH);

    // Bar
    ctx.beginPath();
    const r=Math.min(5,bw/2);
    ctx.moveTo(x+r,y);
    ctx.lineTo(x+bw-r,y);
    ctx.quadraticCurveTo(x+bw,y,x+bw,y+r);
    ctx.lineTo(x+bw,y+barH);
    ctx.lineTo(x,y+barH);
    ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();

    if(b.done){
      const g=ctx.createLinearGradient(0,y,0,y+barH);
      g.addColorStop(0,'#c8f53a');
      g.addColorStop(1,'rgba(200,245,58,0.5)');
      ctx.fillStyle=g;
    } else {
      ctx.fillStyle=b.isToday?'rgba(77,184,255,0.25)':'#252540';
    }
    ctx.fill();

    // Today border
    if(b.isToday){
      ctx.strokeStyle=b.done?'#c8f53a':'#4db8ff';
      ctx.lineWidth=1.5;
      ctx.stroke();
    }

    // Label below
    ctx.fillStyle=b.isToday?'#4db8ff':(b.done?'#c8f53a':'#525270');
    ctx.font=`bold ${b.isToday?10:9}px system-ui`;
    ctx.textAlign='center';
    ctx.fillText(b.label, x+bw/2, H-padB+14);
  });
}

  document.getElementById('ed-lht').textContent=t('ed-lht');
  document.getElementById('ed-lag').textContent=t('ed-lag');
  document.getElementById('ed-sv').textContent=t('ed-sv');
  document.getElementById('editMov').classList.add('on');
}
function closeMov(id){document.getElementById(id).classList.remove('on');}
function saveEdit(){
  const n=document.getElementById('ed-nm').value.trim();
  const w=+document.getElementById('ed-wt').value;
  const h=+document.getElementById('ed-ht').value;
  const a=+document.getElementById('ed-ag').value;
  if(!n){toast(L==='ar'?'أدخل الاسم':'Enter name');return;}
  if(!a||a<10||a>100){toast(L==='ar'?'العمر بين 10 و100':'Age: 10–100');return;}
  if(!w||w<20||w>300){toast(L==='ar'?'الوزن بين 20 و300 كغ':'Weight: 20–300 kg');return;}
  if(!h||h<100||h>250){toast(L==='ar'?'الطول بين 100 و250 سم':'Height: 100–250 cm');return;}
  P.name=n; P.weight=w; P.height=h; P.age=a;
  calcCal(); save(); closeMov('editMov'); rProfile(); rHome();
  toast(t('toast-saved'));
}
function doReset(){
  if(confirm(t('confirm-reset'))){localStorage.removeItem('ff7');localStorage.removeItem('ff7_pt');location.reload();}}

function startApp(){
  // Called by splash "ابدأ" button — go to setup for new users
  document.getElementById('pg-splash').classList.remove('on');
  document.getElementById('pg-setup').classList.add('on');
  CS=1; showStep(1);
}

function initApp(){
  // Called once on page load
  const has=load();
  applyLang();
  if(has){
    // Returning user — go straight to main with data
    if(P.lastWD!==new Date().toDateString()) P.doneToday=false;
    if(!_WP) genWK(false);
    showMain();
  } else {
    // New user — show splash
    document.getElementById('pg-splash').classList.add('on');
  }
}
// Register Service Worker for PWA auto-updates
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(reg=>{ reg.update(); })
      .catch(err=>console.warn('SW failed:',err));
  });
}

window.onload=()=>{
  initApp();
  setInterval(()=>{if(document.getElementById('pg-main').classList.contains('on'))save();},30000);
};
